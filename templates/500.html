{% extends "base.html" %}

{% block title %}500 - Server Error | Job Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-danger">
            <div class="card-body text-center py-5">
                <h1 class="display-4 text-danger mb-3"><i class="bi bi-bug"></i> 500</h1>
                <h2 class="h4 mb-3">Internal Server Error</h2>
                <p class="text-muted mb-4">Something went wrong on our side. Our team has been notified.</p>
                <a href="{% url 'jobs:job_list' %}" class="btn btn-primary"><i class="bi bi-house"></i> Go Back Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
