{% extends "base.html" %}

{% block title %}403 - Permission Denied | Job Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-danger">
            <div class="card-body text-center py-5">
                <h1 class="display-4 text-danger mb-3"><i class="bi bi-shield-lock"></i> 403</h1>
                <h2 class="h4 mb-3">Permission Denied</h2>
                <p class="text-muted mb-4">You don't have permission to access this page or perform this action.</p>
                {% if user.is_authenticated %}
                    <a href="{% url 'jobs:job_list' %}" class="btn btn-primary"><i class="bi bi-house"></i> Go Back Home</a>
                {% else %}
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary"><i class="bi bi-box-arrow-in-right"></i> Login</a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
