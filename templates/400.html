{% extends "base.html" %}

{% block title %}400 - Bad Request | Job Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-warning">
            <div class="card-body text-center py-5">
                <h1 class="display-4 text-warning mb-3"><i class="bi bi-exclamation-triangle"></i> 400</h1>
                <h2 class="h4 mb-3">Bad Request</h2>
                <p class="text-muted mb-4">The request could not be understood by the server. Please check the URL or the data you submitted.</p>
                <a href="{% url 'jobs:job_list' %}" class="btn btn-primary"><i class="bi bi-house"></i> Go Back Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
